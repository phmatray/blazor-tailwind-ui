name: publish

# Auto-publish on the release branch. To cut a release: bump <Version> in
# Directory.Build.props (and src/DaisyBlazor.Tailwind/package.json) on main, then
# fast-forward `release` to that commit:  git push origin main:release
on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write   # create tags + GitHub releases

jobs:
  publish:
    name: Pack & publish
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Read version
        id: ver
        run: echo "version=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test tests/DaisyBlazor.Components.Tests/DaisyBlazor.Components.Tests.csproj -c Release

      - name: Pack
        run: |
          set -e
          rm -rf artifacts
          dotnet pack src/DaisyBlazor.Components/DaisyBlazor.Components.csproj -c Release -o artifacts
          dotnet pack src/DaisyBlazor.Charts/DaisyBlazor.Charts.csproj         -c Release -o artifacts
          dotnet pack templates/DaisyBlazor.Templates/DaisyBlazor.Templates.csproj -c Release -o artifacts
          ls -1 artifacts/*.nupkg

      - name: Push to NuGet
        run: |
          set -e
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              -k "${{ secrets.NUGET_API_KEY }}" \
              -s https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Publish npm preset
        if: env.NPM_TOKEN != ''
        working-directory: src/DaisyBlazor.Tailwind
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          tag="v${{ steps.ver.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — updating assets."
            gh release upload "$tag" artifacts/*.nupkg --clobber
          else
            git tag -a "$tag" -m "DaisyBlazor $tag"
            git push origin "$tag"
            gh release create "$tag" --title "$tag" --generate-notes artifacts/*.nupkg
          fi
