<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatalystUI.Demo</title>
    <base href="/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            50: 'rgb(250 250 250)',
                            100: 'rgb(244 244 245)',
                            200: 'rgb(228 228 231)',
                            300: 'rgb(212 212 216)',
                            400: 'rgb(161 161 170)',
                            500: 'rgb(113 113 122)',
                            600: 'rgb(82 82 91)',
                            700: 'rgb(63 63 70)',
                            800: 'rgb(39 39 42)',
                            900: 'rgb(24 24 27)',
                            950: 'rgb(9 9 11)'
                        }
                    },
                    fontSize: {
                        'sm/6': ['0.875rem', '1.5rem'],
                        'base/6': ['1rem', '1.5rem']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="_content/CatalystUI.Components/css/catalyst-ui.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CatalystUI.Demo.styles.css" rel="stylesheet" />
    <script src="_content/CatalystUI.Components/js/catalyst-ui.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
